# Pin the Rust toolchain for reproducible builds across Windows/macOS/Linux CI.
# Stable channel; CI installs the same toolchain so local == CI.
[toolchain]
channel = "stable"
components = ["rustfmt", "clippy"]
targets = [
    "x86_64-pc-windows-msvc",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-unknown-linux-gnu",
]
profile = "default"
